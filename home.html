<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracer</title>
    <!-- font awesome cdn  ------------------------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy Ui------------------------------------  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font --------------------------------- -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    </style>
    <!-- css file  -->
     <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- header section  -->

    <header>
        <div class="navbar bg-base-100 shadow-sm flex justify-around gap-60 ">
            <div class="flex  items-center ">
                <img class="w-9" src="assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2 ">
                <input type="text" placeholder="🔍 Search issues..." class="input input-bordered w-24 md:w-auto" />

                <div class="btn btn-primary px-4 py-3">
                    <button> <i class="fa-solid fa-plus"></i> New Issue</button>
                </div>


            </div>
        </div>
    </header>

    <!-- main body  -->
    <main class="w-8/12 mx-auto">


        <!-- category section  -->
        <div class="cetagory px-8  my-8  shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] py-4  rounded-md space-x-4 ">
            <button onclick="toggleBtn('all-taps') ; showIssues(allSec)"  id="all-taps" class="btn px-12  border border-gray-200 shadow-none  btn-primary">All</button>
            <button onclick="toggleBtn('open-tap') ; showIssues(openSection)" id="open-tap" class="btn px-12 ">Open</button>
            <button onclick="toggleBtn('close-tap') ; showIssues(ClosedSection)"  id="close-tap" class="btn px-12">Closed</button>
        </div>


        <!-- issues counter  -->
        <div
            class="issues px-8 flex justify-between items-center shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] py-4  rounded-md">
            <div class="left flex gap-2">
                <img class="w-[50px] bg-blue-200 rounded-full p-2" src="assets/Aperture.png" alt="">
                <div class="">
                    <h3 id="issues-count" class="text-[#1F2937] font-semibold text-[20px]">50 Issues</h3>
                    <p class="text-[#64748b]"> Track and manage your project issues</p>
                </div>
            </div>
            <div class="right flex gap-4">
                <p class="font-semibold"><i class="fa-solid fa-circle text-green-600 border-none "></i> Open</p>
                <p class="font-semibold"><i class="fa-solid fa-circle text-purple-500 border-none "></i> close</p>
            </div>


        </div>
        <hr class="text-gray-300">



        <!-- issues container  -->
        <section>
            <div  id="issues-container" class=" grid grid-cols-1 md:grid-cols-3 gap-3 bg-[#FBFBFB]">







            </div>

            <!-- modal  -->
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <div id="modal-container">
                        



                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>



        </section>


    </main>





    <!-- home js file  -->
    <script src="./js/home.js"></script>
</body>

</html>
