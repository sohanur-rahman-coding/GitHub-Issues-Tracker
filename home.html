<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracer</title>
    <!-- font awesome cdn  ------------------------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy Ui------------------------------------  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font --------------------------------- -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    </style>
    <!-- css file  -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
</head>

<body>

    <!-- header section  -->

    <header class="sticky   top-0 z-20">
        <div
            class="navbar bg-base-100 mx-auto shadow-sm   flex flex-col gap-5  md:flex-row  justify-between items-center ">
            <div class="flex  items-center ">
                <img class="w-9" src="assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class=" ">
                <div class="join">
                    <div>
                        <label class="input validator join-item">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input id="input-field" type="text" placeholder="Search issues..." required />
                        </label>
                        <div class="validator-hint hidden">Enter a valid issue title</div>
                    </div>
                    <button id="search-btn" class="btn btn-neutral join-item">Search</button>
                </div>


            </div>
        </div>
    </header>

    <!-- main body  -->
    <main class="w-11/12 md:w-9/12 mx-auto">


        <!-- category section  -->
        <div class="cetagory px-8 my-2 sticky top-[7.3rem]  md:top-[4rem] z-20 bg-[#FBFBFB] 
            flex flex-wrap justify-center md:justify-start
            gap-4
            shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] 
            py-4 rounded-md">
            <button onclick=" toggleBtn('all-taps') ; showIssues(allSec)" id="all-taps"
                class="btn min-h-0 h-8 px-6 py-1 border border-gray-200 shadow-none  btn-primary">All</button>
            <button onclick="toggleBtn('open-tap') ; showIssues(openSection)" id="open-tap"
                class="btn min-h-0 h-8 px-6 py-1 ">Open</button>
            <button onclick="toggleBtn('close-tap') ; showIssues(ClosedSection)" id="close-tap"
                class="btn min-h-0 h-8 px-6 py-1">Closed</button>
        </div>


        <!-- issues counter  -->
        <div class="issues px-8 
            flex flex-col md:flex-row 
            justify-between items-start md:items-center 
            gap-4
            shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] 
            py-2 rounded-md">
            <div class="left flex gap-2">
                <img class="w-auto bg-blue-200 rounded-full p-2" src="assets/Aperture.png" alt="">
                <div class="">
                    <h3 id="issues-count" class=" text-[#1F2937] font-semibold text-[18px]">50 Issues</h3>
                    <p class="text-[14px] text-[#64748b]"> Track and manage your project issues</p>
                </div>
            </div>
            <div class="right flex gap-4">
                <p class="font-semibold"><i class="fa-solid fa-circle text-green-600 border-none "></i> Open</p>
                <p class="font-semibold"><i class="fa-solid fa-circle text-purple-500 border-none "></i> close</p>
            </div>


        </div>
        <hr class="text-gray-300">



        <!-- issues container  -->
        <section>
            <!-- spinner -->
            <div id="spinner" class="flex justify-center items-center h-40 hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
            <!-- container for words when data is loading -->
            <div id="issues-container" class=" grid grid-cols-1 md:grid-cols-4 gap-3 bg-[#FBFBFB]">







            </div>

            <!-- modal  -->
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box p-6 pb-4 rounded-2xl">
                    <div id="modal-container">



                    </div>
                    <div class="modal-action mt-2">
                        <form method="dialog ">
                            <!-- if there is a button in form, it will close the modal -->
                            <button
                                class="px-3 py-1.5 rounded-md bg-gradient-to-r from-purple-500 to-blue-500  text-white text-sm font-medium               shadow-sm hover:shadow-md  hover:from-purple-600 hover:to-blue-600  transition-all duration-200  focus:outline-none focus:ring-2 focus:ring-purple-400 focus:ring-offset-1 cursor-pointer">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>



        </section>


    </main>




    <!-- home js file  -->
    <script src="./js/home.js"></script>
</body>

</html>
